<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bitcoin BIP Dependency Tree</title>
    <script type="text/javascript" src="https://unpkg.com/vis-network/standalone/umd/vis-network.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0; padding: 0; font-family: 'Inter', sans-serif;
            display: flex; height: 100vh; background-color: #f8f9fa; color: #333;
            overflow: hidden;
        }
        
        #menu-toggle {
            display: none;
            position: absolute;
            color: #1a1a1a;
            top: 16px; left: 16px; z-index: 5;
            background: #ffffff; border: 1px solid #e2e8f0;
            padding: 10px 14px; border-radius: 6px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1); cursor: pointer;
            font-weight: 600; font-family: 'Inter', sans-serif;
        }

        #sidebar {
            width: 548px; background: #ffffff; box-shadow: 2px 0 10px rgba(0,0,0,0.05);
            padding: 24px; display: flex; flex-direction: column; z-index: 10;
            overflow-y: auto; box-sizing: border-box;
        }

        #close-sidebar {
            display: none; background: none; border: none; color: #64748b;
            font-size: 28px; cursor: pointer; align-self: flex-end;
            margin-top: -10px; margin-right: -10px; line-height: 1;
        }
        
        h1 { font-size: 20px; margin-top: 0; color: #1a1a1a; }
        p { font-size: 14px; color: #666; line-height: 1.5; }
        
        .control-group { margin-top: 20px; display: flex; flex-direction: column; gap: 10px; }
        input[type="number"] {
            padding: 10px; border: 1px solid #e2e8f0; border-radius: 6px; font-family: 'Inter';
        }
        button {
            background-color: #f7931a; color: white; border: none; padding: 12px 16px;
            font-size: 14px; font-weight: 600; border-radius: 6px; cursor: pointer;
            transition: background-color 0.2s;
        }
        button:hover { background-color: #e08517; }
        button:disabled { background-color: #ccc; cursor: not-allowed; }
        button.secondary { background-color: #64748b; }
        button.secondary:hover { background-color: #475569; }
        
        #progress-container { margin-top: 20px; }
        #status-text { font-size: 13px; font-weight: 600; margin-bottom: 8px; display: block; }
        .progress-bar-bg { background: #e2e8f0; border-radius: 4px; height: 8px; width: 100%; overflow: hidden; }
        .progress-bar-fill { background: #f7931a; height: 100%; width: 0%; transition: width 0.1s; }

        #isolated-bips-container { display: none; margin-top: 15px; }
        details summary { font-size: 13px; font-weight: 600; color: #64748b; cursor: pointer; outline: none; }
        #isolated-list {
            margin-top: 8px; font-size: 12px; color: #666; max-height: 120px;
            overflow-y: auto; padding: 10px; background: #f8f9fa;
            border: 1px solid #e2e8f0; border-radius: 6px; line-height: 1.6;
        }

        #details-panel {
            display: none; margin-top: 30px; padding-top: 20px; border-top: 1px solid #e2e8f0;
        }
        #detail-bip-number { margin: 0 0 8px 0; font-size: 18px; color: #1a1a1a; }
        #detail-title { font-weight: 600; color: #475569; font-size: 14px; margin: 0 0 16px 0; line-height: 1.4; }
        
        .meta-grid {
            display: grid; grid-template-columns: 60px 1fr; gap: 8px;
            font-size: 13px; color: #333; margin-bottom: 16px;
        }
        .meta-label { font-weight: 600; color: #64748b; }
        
        .dependency-row { font-size: 13px; color: #64748b; margin: 0 0 8px 0; }
        #detail-required-by { margin-bottom: 16px; }
        
        .req-link {
            color: #f7931a; text-decoration: none; font-weight: 600; cursor: pointer;
        }
        .req-link:hover { text-decoration: underline; color: #e08517; }

        .replacement-badge {
            display: inline-block; padding: 2px 8px; border-radius: 4px;
            font-size: 11px; font-weight: 600; margin-top: 4px;
        }
        .badge-replaced {
            background: #fef2f2; color: #dc2626; border: 1px solid #fecaca;
        }
        .badge-replaces {
            background: #f0fdf4; color: #16a34a; border: 1px solid #bbf7d0;
        }
        
        #detail-link {
            display: inline-block; background: #f1f5f9; padding: 8px 12px; border-radius: 6px;
            text-decoration: none; color: #0f172a; font-size: 13px; font-weight: 600; border: 1px solid #e2e8f0;
            transition: background-color 0.2s;
            margin-top: 8px; text-align: center;
        }
        #detail-link:hover { background: #e2e8f0; }

        #network-container { flex-grow: 1; height: 100%; background-color: #fafbfc; position: relative; width: 100%; }
        div.vis-tooltip {
            font-family: 'Inter', sans-serif; font-size: 12px; background-color: #333;
            color: #fff; padding: 8px 12px; border-radius: 4px; border: none;
        }

        @media (max-width: 768px) {
            #menu-toggle { display: block; }
            #close-sidebar { display: block; }
            #sidebar {
                position: absolute; left: -100%; height: 100vh;
                transition: left 0.3s ease; max-width: 85vw;
            }
            #sidebar.active { left: 0; }
        }
    </style>
</head>
<body>

<button id="menu-toggle" onclick="toggleSidebar()">☰ Menu</button>

<div id="sidebar">
    <button id="close-sidebar" onclick="toggleSidebar()">&times;</button>
    <h1>BIP Dependency Tree</h1>
    <p>Fetches data directly from the bitcoin/bips GitHub repository to map out prerequisites.</p>
    
    <div class="control-group">
        <button id="fetchBtn" onclick="buildBipTree()">Refresh Tree</button>
        <div style="display: flex; gap: 8px; margin-top: 10px;">
            <input type="number" id="searchInput" placeholder="Search BIP #" style="flex-grow: 1;" onkeypress="if(event.key === 'Enter') searchNode()" disabled>
            <button id="searchBtn" onclick="searchNode()" disabled>Find</button>
        </div>
    </div>
    
    <div id="progress-container" style="display: none;">
        <span id="status-text">Fetching repository index...</span>
        <div class="progress-bar-bg">
            <div id="progress-fill" class="progress-bar-fill"></div>
        </div>
    </div>

    <div id="isolated-bips-container">
        <details>
            <summary><span id="isolated-count">0</span> Isolated BIPs Hidden from Graph</summary>
            <div id="isolated-list"></div>
        </details>
    </div>

    <div id="details-panel">
        <h2 id="detail-bip-number"></h2>
        <p id="detail-title"></p>
        
        <div class="meta-grid">
            <span class="meta-label">Status:</span>
            <span id="detail-status"></span>
            
            <span class="meta-label">Type:</span>
            <span id="detail-type"></span>
            
            <span class="meta-label">Layer:</span>
            <span id="detail-layer"></span>
        </div>

        <div id="detail-requires" class="dependency-row"></div>
        <div id="detail-required-by" class="dependency-row"></div>
        <div id="detail-replaces" class="dependency-row"></div>
        <div id="detail-replaced-by" class="dependency-row"></div>
        <a id="detail-link" href="#" target="_blank">View on GitHub</a>
    </div>
</div>

<div id="network-container"></div>

<script>
    const GITHUB_REPO_TREE = "https://api.github.com/repos/bitcoin/bips/git/trees/master";
    const GITHUB_RAW_BASE = "https://raw.githubusercontent.com/bitcoin/bips/master/";
    const GITHUB_WEB_BASE = "https://github.com/bitcoin/bips/blob/master/";

    let network = null;
    let nodesDataSet = null;
    let edgesDataSet = null;
    let fullNodesData = []; 

    function toggleSidebar(forceOpen = false) {
        const sidebar = document.getElementById('sidebar');
        if (forceOpen === true) {
            sidebar.classList.add('active');
        } else {
            sidebar.classList.toggle('active');
        }
    }

    async function fetchRepoTree() {
        const response = await fetch(GITHUB_REPO_TREE);
        if (!response.ok) throw new Error("Failed to fetch repository tree.");
        const data = await response.json();
        
        const bipFiles = [];
        const bipRegex = /^bip-(\d{4})\.(mediawiki|md)$/i;

        for (const file of data.tree) {
            const match = file.path.match(bipRegex);
            if (match) {
                bipFiles.push({
                    number: parseInt(match[1], 10),
                    filename: file.path
                });
            }
        }
        return bipFiles;
    }

    async function fetchBipData(bipInfo) {
        const response = await fetch(`${GITHUB_RAW_BASE}${bipInfo.filename}`);
        if (!response.ok) return null;
        
        const text = await response.text();
        const parsedData = parseBipHeader(text, bipInfo.number);
        
        parsedData.githubUrl = `${GITHUB_WEB_BASE}${bipInfo.filename}`;
        return parsedData;
    }

    function parseBipHeader(text, currentNum) {
        const titleMatch = text.match(/Title:\s*(.+)/i);
        const title = titleMatch ? titleMatch[1].trim() : "Unknown Title";

        const layerMatch = text.match(/Layer:\s*(.+)/i);
        const statusMatch = text.match(/Status:\s*(.+)/i);
        const typeMatch = text.match(/Type:\s*(.+)/i);

        const requiresMatch = text.match(/Requires:\s*([0-9,\s]+)/i);
        const requires = [];

        if (requiresMatch) {
            const rawReqs = requiresMatch[1].split(',');
            for (let req of rawReqs) {
                const parsedReq = parseInt(req.trim(), 10);
                if (!isNaN(parsedReq)) {
                    requires.push(parsedReq);
                }
            }
        }

        const replacesMatch = text.match(/Replaces:\s*([0-9,\s]+)/i);
        const replaces = [];
        if (replacesMatch) {
            const rawReps = replacesMatch[1].split(',');
            for (let rep of rawReps) {
                const parsed = parseInt(rep.trim(), 10);
                if (!isNaN(parsed)) replaces.push(parsed);
            }
        }

        const supersededByMatch = text.match(/(?:Superseded-By|Replaced-By|Proposed-Replacement):\s*([0-9,\s]+)/i);
        const replacedBy = [];
        if (supersededByMatch) {
            const rawSups = supersededByMatch[1].split(',');
            for (let sup of rawSups) {
                const parsed = parseInt(sup.trim(), 10);
                if (!isNaN(parsed)) replacedBy.push(parsed);
            }
        }

        return { 
            id: currentNum, 
            title: title, 
            layer: layerMatch ? layerMatch[1].trim() : "N/A",
            status: statusMatch ? statusMatch[1].trim() : "N/A",
            type: typeMatch ? typeMatch[1].trim() : "N/A",
            requires: requires,
            replaces: replaces,
            replacedBy: replacedBy
        };
    }

    function formatLabel(id, title) {
        const maxLineLength = 20;
        const words = title.split(' ');
        let lines = [];
        let currentLine = words[0];

        for (let i = 1; i < words.length; i++) {
            if (currentLine.length + words[i].length + 1 <= maxLineLength) {
                currentLine += ' ' + words[i];
            } else {
                lines.push(currentLine);
                currentLine = words[i];
            }
        }
        lines.push(currentLine);
        return `BIP ${id}\n\n` + lines.join('\n');
    }

    async function buildBipTree() {
        const btn = document.getElementById('fetchBtn');
        const progressContainer = document.getElementById('progress-container');
        const statusText = document.getElementById('status-text');
        const progressFill = document.getElementById('progress-fill');
        const detailsPanel = document.getElementById('details-panel');
        const isolatedContainer = document.getElementById('isolated-bips-container');
        
        btn.disabled = true;
        progressContainer.style.display = 'block';
        detailsPanel.style.display = 'none';
        isolatedContainer.style.display = 'none';
        progressFill.style.width = '0%';
        statusText.innerText = 'Fetching repository index...';
        
        let bipFiles;
        try {
            bipFiles = await fetchRepoTree();
        } catch (error) {
            statusText.innerText = "Error fetching repository index.";
            btn.disabled = false;
            return;
        }

        fullNodesData = [];
        const edgesData = [];
        let completed = 0;
        const totalBips = bipFiles.length;

        const batchSize = 50;
        for (let i = 0; i < totalBips; i += batchSize) {
            const batchPromises = [];
            const batch = bipFiles.slice(i, i + batchSize);
            
            for (let bipInfo of batch) {
                batchPromises.push(
                    fetchBipData(bipInfo).then(result => {
                        completed++;
                        const percent = Math.round((completed / totalBips) * 100);
                        progressFill.style.width = percent + '%';
                        statusText.innerText = `Fetching content... ${percent}%`;
                        return result;
                    })
                );
            }
            
            const batchResults = await Promise.all(batchPromises);
            
            for (let bip of batchResults) {
                if (bip) {
                    // Determine visual style based on replacement status
                    let nodeColor, nodeFontColor, nodeBorderWidth;
                    if (bip.replacedBy && bip.replacedBy.length > 0) {
                        // This BIP was replaced — dimmed with red dashed border
                        nodeColor = { background: '#fef2f2', border: '#f87171', highlight: { background: '#fee2e2', border: '#dc2626' }};
                        nodeFontColor = '#9ca3af';
                        nodeBorderWidth = 2;
                    } else if (bip.replaces && bip.replaces.length > 0) {
                        // This BIP replaces another — green accent
                        nodeColor = { background: '#f0fdf4', border: '#4ade80', highlight: { background: '#dcfce7', border: '#16a34a' }};
                        nodeFontColor = '#1a1a1a';
                        nodeBorderWidth = 2;
                    } else {
                        nodeColor = { background: '#ffffff', border: '#e2e8f0', highlight: { background: '#fef5e8', border: '#f7931a' }};
                        nodeFontColor = '#1a1a1a';
                        nodeBorderWidth = 1;
                    }

                    fullNodesData.push({ 
                        id: bip.id, 
                        label: formatLabel(bip.id, bip.title),
                        title: `BIP ${bip.id}: ${bip.title}`, 
                        fullTitle: bip.title,
                        bipLayer: bip.layer,
                        bipStatus: bip.status,
                        bipType: bip.type,
                        githubUrl: bip.githubUrl,
                        requiresList: bip.requires,
                        replacesList: bip.replaces,
                        replacedByList: bip.replacedBy,
                        shape: 'box', margin: 12,
                        color: nodeColor,
                        font: { face: 'Inter', size: 12, color: nodeFontColor },
                        borderWidth: nodeBorderWidth, 
                        shapeProperties: (bip.replacedBy && bip.replacedBy.length > 0) ? { borderDashes: [6, 4] } : {},
                        shadow: { enabled: true, color: 'rgba(0,0,0,0.05)', size: 5, x: 2, y: 2 }
                    });

                    for (let req of bip.requires) {
                        edgesData.push({ 
                            from: bip.id, to: req, 
                            edgeType: 'dependency',
                            arrows: { to: { enabled: true, scaleFactor: 0.5 } },
                            color: { color: '#cbd5e1', highlight: '#f7931a' },
                            smooth: { type: 'cubicBezier', forceDirection: 'vertical', roundness: 0.4 }
                        });
                    }

                    // Add dashed replacement edges
                    for (let repId of bip.replaces) {
                        edgesData.push({
                            from: bip.id, to: repId,
                            edgeType: 'replacement',
                            arrows: { to: { enabled: true, scaleFactor: 0.5, type: 'triangle' } },
                            color: { color: '#f87171', highlight: '#dc2626' },
                            dashes: [8, 6],
                            width: 2,
                            smooth: { type: 'cubicBezier', forceDirection: 'vertical', roundness: 0.4 },
                            title: `BIP ${bip.id} replaces BIP ${repId}`
                        });
                    }
                }
            }
        }

        statusText.innerText = `Filtering isolated nodes...`;

        const connectedNodeIds = new Set();
        edgesData.forEach(edge => {
            connectedNodeIds.add(edge.from);
            connectedNodeIds.add(edge.to);
        });

        const filteredNodesData = fullNodesData.filter(node => connectedNodeIds.has(node.id));
        const isolatedNodesData = fullNodesData.filter(node => !connectedNodeIds.has(node.id));

        document.getElementById('isolated-count').innerText = isolatedNodesData.length;
        const isolatedListDiv = document.getElementById('isolated-list');
        isolatedListDiv.innerHTML = '';
        
        isolatedNodesData.forEach((node, index) => {
            const link = document.createElement('a');
            link.href = '#';
            link.className = 'req-link';
            link.innerText = node.id;
            link.onclick = (e) => {
                e.preventDefault();
                goToNode(node.id);
            };
            isolatedListDiv.appendChild(link);
            
            if (index < isolatedNodesData.length - 1) {
                isolatedListDiv.appendChild(document.createTextNode(', '));
            }
        });
        
        isolatedContainer.style.display = 'block';

        statusText.innerText = `Calculating dependency depth...`;

        const nodesMap = new Map();
        filteredNodesData.forEach(n => nodesMap.set(n.id, n));
        const nodeLevels = new Map();

        function getLevel(nodeId, visited = new Set()) {
            if (nodeLevels.has(nodeId)) return nodeLevels.get(nodeId);
            if (visited.has(nodeId)) return 0; 
            
            visited.add(nodeId);
            const node = nodesMap.get(nodeId);
            
            if (!node || !node.requiresList || node.requiresList.length === 0) {
                nodeLevels.set(nodeId, 0);
                return 0;
            }

            let maxReqLevel = -1;
            for (let reqId of node.requiresList) {
                const reqLevel = getLevel(reqId, new Set(visited));
                if (reqLevel > maxReqLevel) {
                    maxReqLevel = reqLevel;
                }
            }

            const level = maxReqLevel + 1;
            nodeLevels.set(nodeId, level);
            return level;
        }

        filteredNodesData.forEach(node => {
            node.level = getLevel(node.id);
        });

        statusText.innerText = `Rendering graph...`;

        const container = document.getElementById('network-container');
        nodesDataSet = new vis.DataSet(filteredNodesData);
        edgesDataSet = new vis.DataSet(edgesData);
        
        const data = { nodes: nodesDataSet, edges: edgesDataSet };
        
        const options = {
            layout: { 
                hierarchical: { 
                    direction: 'UD',
                    nodeSpacing: 140, 
                    levelSeparation: 160, 
                    treeSpacing: 120,
                    parentCentralization: true 
                }
            },
            physics: { 
                enabled: true,
                hierarchicalRepulsion: {
                    nodeDistance: 140,
                    avoidOverlap: 1
                }
            }, 
            interaction: { 
                hover: true, 
                tooltipDelay: 200,
                navigationButtons: true,
                keyboard: true
            }
        };

        network = new vis.Network(container, data, options);
        
        network.on("selectNode", function (params) {
            const nodeId = params.nodes[0];
            showDetails(nodeId);
            if (window.innerWidth <= 768) {
                toggleSidebar(true);
            }
        });

        network.on("deselectNode", function () {
            document.getElementById('details-panel').style.display = 'none';
        });

        network.once("stabilizationIterationsDone", function () {
            // Center on the graph with a readable zoom level instead of fitting everything
            network.moveTo({ scale: 0.5, animation: { duration: 800, easingFunction: 'easeInOutQuad' } });
        });

        statusText.innerText = "Complete.";
        setTimeout(() => { progressContainer.style.display = 'none'; }, 2000);
        
        document.getElementById('searchInput').disabled = false;
        document.getElementById('searchBtn').disabled = false;
        btn.disabled = false;
    }

    function createClickableLinks(containerId, prefixText, idsArray) {
        const container = document.getElementById(containerId);
        container.innerHTML = ''; 

        if (idsArray && idsArray.length > 0) {
            container.appendChild(document.createTextNode(prefixText));
            
            idsArray.forEach((id, index) => {
                const link = document.createElement('a');
                link.textContent = id;
                link.href = '#';
                link.className = 'req-link';
                link.onclick = (e) => {
                    e.preventDefault();
                    goToNode(id);
                };
                container.appendChild(link);
                
                if (index < idsArray.length - 1) {
                    container.appendChild(document.createTextNode(', '));
                }
            });
        } else {
            container.innerText = `${prefixText}None`;
        }
    }

    function createClickableLinksInline(container, idsArray) {
        idsArray.forEach((id, index) => {
            const link = document.createElement('a');
            link.textContent = `BIP ${id}`;
            link.href = '#';
            link.className = 'req-link';
            link.onclick = (e) => {
                e.preventDefault();
                goToNode(id);
            };
            container.appendChild(link);
            if (index < idsArray.length - 1) {
                container.appendChild(document.createTextNode(', '));
            }
        });
    }

    function showDetails(nodeId, explicitNodeData = null) {
        const nodeData = explicitNodeData || nodesDataSet.get(nodeId);
        if (!nodeData) return;

        const detailsPanel = document.getElementById('details-panel');
        
        detailsPanel.style.display = 'block';
        document.getElementById('detail-bip-number').innerText = `BIP ${nodeData.id}`;
        document.getElementById('detail-title').innerText = nodeData.fullTitle;
        
        document.getElementById('detail-status').innerText = nodeData.bipStatus;
        document.getElementById('detail-type').innerText = nodeData.bipType;
        document.getElementById('detail-layer').innerText = nodeData.bipLayer;
        
        createClickableLinks('detail-requires', 'Requires: ', nodeData.requiresList);

        const requiredByEdges = edgesDataSet.get({
            filter: function (item) {
                return item.to === nodeId && item.edgeType === 'dependency';
            }
        });
        const requiredByList = requiredByEdges.map(edge => edge.from);
        
        createClickableLinks('detail-required-by', 'Required by: ', requiredByList);

        // Replaces / Replaced-by info
        const replacesContainer = document.getElementById('detail-replaces');
        const replacedByContainer = document.getElementById('detail-replaced-by');
        replacesContainer.innerHTML = '';
        replacedByContainer.innerHTML = '';

        if (nodeData.replacesList && nodeData.replacesList.length > 0) {
            const badge = document.createElement('span');
            badge.className = 'replacement-badge badge-replaces';
            badge.textContent = '↑ REPLACES';
            replacesContainer.appendChild(badge);
            replacesContainer.appendChild(document.createTextNode(' '));
            createClickableLinksInline(replacesContainer, nodeData.replacesList);
        }

        if (nodeData.replacedByList && nodeData.replacedByList.length > 0) {
            const badge = document.createElement('span');
            badge.className = 'replacement-badge badge-replaced';
            badge.textContent = '✗ REPLACED BY';
            replacedByContainer.appendChild(badge);
            replacedByContainer.appendChild(document.createTextNode(' '));
            createClickableLinksInline(replacedByContainer, nodeData.replacedByList);
        }

        document.getElementById('detail-link').href = nodeData.githubUrl;
    }

    function goToNode(bipNum) {
        if (!network) return;
        
        const inGraph = nodesDataSet.get(bipNum);
        
        if (inGraph) {
            network.selectNodes([bipNum]);
            network.focus(bipNum, { scale: 1.2, animation: true });
            document.getElementById('detail-link').style.display = 'inline-block';
            showDetails(bipNum);
        } else {
            const isolatedNodeData = fullNodesData.find(n => n.id === bipNum);
            if (isolatedNodeData) {
                network.unselectAll(); 
                document.getElementById('detail-link').style.display = 'inline-block';
                showDetails(bipNum, isolatedNodeData);
            } else {
                alert(`BIP ${bipNum} not found in the repository index.`);
                return;
            }
        }
        
        if (window.innerWidth <= 768) {
            toggleSidebar(true);
        }
    }

    function searchNode() {
        const input = document.getElementById('searchInput').value;
        if (!input) return;
        const bipNum = parseInt(input, 10);
        goToNode(bipNum);
    }

    window.addEventListener('DOMContentLoaded', buildBipTree);
</script>

</body>
</html>
